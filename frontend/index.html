<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wati</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="theme-color" content="#1B4332" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta http-equiv="Content-Security-Policy" content="
      default-src 'self'; 
      connect-src 'self' ws: wss: http://analytics.localhost http://localhost:5001 https://api.wati.health https://obs.wati.health; 
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://obs.wati.health http://analytics.localhost; 
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      object-src 'none';
    ">

  <script>
    (function() {
      var websiteId = '__UMAMI_WEBSITE_ID__';
      var scriptUrl = '__UMAMI_SCRIPT_URL__';
      if (websiteId && !websiteId.startsWith('__UMAMI_') && scriptUrl && !scriptUrl.startsWith('__UMAMI_')) {
        var script = document.createElement('script');
        script.async = true;
        script.src = scriptUrl;
        script.setAttribute('data-website-id', websiteId);
        document.head.appendChild(script);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
