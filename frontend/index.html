<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wati</title>
    <!-- 
      Content Security Policy (CSP):
      - Impide llamadas a cualquier API excepto Spoonacular.
      - Bloquea iFrames, Plugins u Objectos incrustados.
      - Fuerz siempre la actualización a HTTPS.
      
      Note: For local Vite dev, inline scripts and styles are needed, 
      so the CSP might cause console errors if strictly enforced during dev.
      We added 'unsafe-inline' and 'unsafe-eval' to allow Vite HMR.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self'; 
      connect-src 'self' ws: wss: https://api.spoonacular.com __CSP_CONNECT_SRC__; 
      script-src 'self' 'unsafe-inline' 'unsafe-eval'; 
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: blob: https://*.spoonacular.com https://images.unsplash.com;
      object-src 'none';
      frame-ancestors 'none';
    ">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
