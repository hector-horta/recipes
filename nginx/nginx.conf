user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types; # OQS image specific path (relative to /opt/nginx/nginx-conf/)
    default_type  application/octet-stream;

    # Forzar TLS 1.3 globalmente para evitar fallbacks vulnerables
    ssl_protocols TLSv1.3;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # DNS Resolver (Docker)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ============================================================
    # ── CONFIGURACIÓN DE DESARROLLO (HTTP - Puerto 80) ──────────
    # ============================================================

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name wati.health api.wati.health analytics.wati.health obs.wati.health;
        return 301 https://$host$request_uri;
    }

    # ── [MAIN APP] HTTPS (wati.health) ──
    server {
        listen 443 ssl;
        server_name wati.health;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # TLS 1.3 Post-Cuántica Híbrida
        ssl_protocols TLSv1.3;
        ssl_ecdh_curve X25519MLKEM768:X25519;

        # Frontend App (Umami used as placeholder for now or actual frontend si no está en Cloudflare)
        location / {
            set $umami_host umami;
            proxy_pass         http://$umami_host:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── [BACKEND API] HTTPS (api.wati.health) ──
    server {
        listen 443 ssl;
        server_name api.wati.health;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # TLS 1.3 Post-Cuántica Híbrida
        ssl_protocols TLSv1.3;
        ssl_ecdh_curve X25519MLKEM768:X25519;

        # Backend API
        location / {
            set $backend_host backend;
            proxy_pass         http://$backend_host:5001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── [ANALYTICS] HTTPS (analytics.wati.health) ──
    server {
        listen 443 ssl;
        server_name analytics.wati.health;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # TLS 1.3 Post-Cuántica Híbrida
        ssl_protocols TLSv1.3;
        ssl_ecdh_curve X25519MLKEM768:X25519;

        location / {
            set $umami_host umami;
            proxy_pass         http://$umami_host:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ── [OBSERVABILITY] HTTPS (obs.wati.health) ──
    server {
        listen 443 ssl;
        server_name obs.wati.health;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # TLS 1.3 Post-Cuántica Híbrida
        ssl_protocols TLSv1.3;
        ssl_ecdh_curve X25519MLKEM768:X25519;

        location / {
            set $dozzle_host dozzle;
            proxy_pass         http://$dozzle_host:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}

