# ============================================================
# Wati — Nginx Reverse Proxy con TLS Post-Cuántico
# TLS 1.2 / 1.3 · Sin RSA KEX · Sin MD5/SHA1
# Intercambio de clave híbrido: X25519 + ML-KEM-768 (FIPS 203)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Redirect HTTP → HTTPS ───────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Principal ─────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        http2 on;

        # ── Certificados ──────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ── Versiones TLS ───────────────────────────────────────
        # Solo TLS 1.2 y TLS 1.3. SSLv3, TLS 1.0 y 1.1 excluidos.
        ssl_protocols TLSv1.2 TLSv1.3;

        # ── Cifradores TLS 1.2 ─────────────────────────────────
        # Solo ECDHE-ECDSA: sin RSA key-exchange, sin MD5, sin SHA1,
        # sin CBC (vulnerable a BEAST/LUCKY13), sin RC4.
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;

        # ── Cifradores TLS 1.3 ─────────────────────────────────
        # Excluye TLS_AES_128_CCM_8_SHA256 (truncated tag, solo IoT).
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;

        # ── Grupos de clave: Híbrido Clásico + Post-Cuántico ───
        # X25519MLKEM768 = X25519 (ECDH clásico) + ML-KEM-768 (FIPS 203, Nivel 3)
        # Protege contra ataques "cosecha-ahora-descifra-después".
        # Si el cliente no negocia ML-KEM, cae automáticamente a X25519.
        ssl_conf_command Groups X25519MLKEM768:X25519:P-384;

        # ── Sesión TLS ─────────────────────────────────────────
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off; # Deshabilitar tickets preserva forward secrecy

        # ── OCSP Stapling (activar en producción con CA real) ──
        # ssl_stapling        on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/certs/chain.pem;

        # ── Headers de Seguridad ────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            DENY                                          always;
        add_header X-Content-Type-Options     nosniff                                       always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
        add_header X-XSS-Protection           "1; mode=block"                               always;

        # ── Proxy: API Backend ─────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:5001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts conservadores para búsquedas a Spoonacular
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Proxy: Frontend SPA (Vite + HMR) ──────────────────
        location / {
            proxy_pass         http://frontend:5173;
            proxy_http_version 1.1;

            # WebSocket necesario para Vite Hot Module Replacement (HMR)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
