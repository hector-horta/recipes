user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types; # OQS image specific path (relative to /opt/nginx/nginx-conf/)
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # DNS Resolver (Docker)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ============================================================
    # ── CONFIGURACIÓN DE DESARROLLO (HTTP - Puerto 80) ──────────
    # ============================================================

    # ── [APP] HTTP Principal (localhost) ──
    server {
        listen 80;
        server_name localhost;

        location /api/ {
            set $backend_host backend;
            proxy_pass         http://$backend_host:5001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            set $frontend_host frontend;
            proxy_pass         http://$frontend_host:5173;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
        }
    }

    # ── [ANALYTICS] HTTP (analytics.localhost) ──
    server {
        listen 80;
        server_name analytics.localhost;

        location / {
            set $umami_host umami;
            proxy_pass         http://$umami_host:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ── [OBSERVABILITY] HTTP (obs.localhost) ──
    server {
        listen 80;
        server_name obs.localhost;

        location / {
            set $dozzle_host dozzle;
            proxy_pass         http://$dozzle_host:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ============================================================
    # ── CONFIGURACIÓN DE PRODUCCIÓN (HTTPS - COMENTADA) ────────
