services:

  # ── Nginx: Reverse Proxy TLS Post-Cuántico ──────────────────────────────
  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs_new:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - app-network

  # ── Frontend (Vite + React) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: base
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached # source code hot-reload (cached for macOS performance)
      - frontend_node_modules:/app/node_modules # named volume: cross-platform node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - app-network

  # ── Backend (Node.js + Express 5) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${PORT:-5001}:${PORT:-5001}"
    volumes:
      - ./backend:/app:cached # source code hot-reload (cached for macOS performance)
      - backend_node_modules:/app/node_modules # named volume: cross-platform node_modules
      - ingest_logs:/app/ingest_logs
      - public_recipes:/app/public/recipes
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:5173
      - POSTGRES_HOST=postgres
      - HCP_CLIENT_ID=${HCP_CLIENT_ID}
      - HCP_CLIENT_SECRET=${HCP_CLIENT_SECRET}
      - HCP_PROJECT_ID=${HCP_PROJECT_ID}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # ── Telegram Bot (Wati Ingest Bot) ─────────────────────────────────────
  telegram-bot:
    build:
      context: ./telegram-bot
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID}
      - BACKEND_URL=http://backend:5001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wati_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wati_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - app-network
    user: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server --protected-mode no --save "" --appendonly no --loglevel notice --rename-command FLUSHDB "" --rename-command FLUSHALL "" --rename-command CONFIG "" --rename-command SHUTDOWN "" --rename-command DEBUG "" --rename-command SLAVEOF "" --rename-command REPLICAOF "" --rename-command CLUSTER "" --requirepass ""
    ports:
      - "6379:6379"
    networks:
      - app-network
    user: redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /data:uid=1000,gid=1000,mode=1777

  # ── Umami Analytics ─────────────────────────────────────────────────────────
  # Panel: https://analytics.localhost  (requiere entrada en /etc/hosts o DNS)
  # Primer arranque: crea cuenta admin en el panel, luego obtén el WEBSITE_ID
  # y agrégalo en .env como UMAMI_WEBSITE_ID y en frontend/index.html.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wati_user}:${POSTGRES_PASSWORD}@postgres:5432/umami_db
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-change_me_in_env_file}
      DISABLE_TELEMETRY: "1"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - app-network

  # ── Dozzle: Log Viewer ──────────────────────────────────────────────────────
  # Acceso: http://localhost:8080  (solo accesible desde la máquina local / VPN)
  # Login requerido: usuario y contraseña definidos en .env
  dozzle:
    image: amir20/dozzle:latest
    environment:
      DOZZLE_USERNAME: ${DOZZLE_USERNAME:-admin}
      DOZZLE_PASSWORD: ${DOZZLE_PASSWORD:-change_me_in_env_file}
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  ingest_logs:
  public_recipes:
  frontend_node_modules:
  backend_node_modules:
