version: "3.8"

services:
  # ── Nginx: Reverse Proxy TLS Post-Cuántico ──────────────────────────────
  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro # Certificados (solo lectura)
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # ── Frontend (Vite + React) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: base
    ports:
      - "5173:5173"   # Expuesto solo para desarrollo directo (sin Nginx)
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./.env:/.env
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      - postgres
      - redis
    stdin_open: true
    tty: true
    networks:
      - app-network

  # ── Backend (Node.js + Express 5) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${PORT:-5001}:${PORT:-5001}"   # Expuesto solo para desarrollo directo
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: wati_user
      POSTGRES_PASSWORD: wati_password
      POSTGRES_DB: wati_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
