services:
  app:
    build:
      context: .
      target: base
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_SPOONACULAR_KEY=${VITE_SPOONACULAR_KEY}
      - VITE_API_MODE=${VITE_API_MODE}
      - NODE_ENV=development
    stdin_open: true
    tty: true
