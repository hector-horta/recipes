version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      target: base
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./.env:/.env
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    networks:
      - app-network
    depends_on:
      - backend
    stdin_open: true
    tty: true

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${PORT:-5001}:${PORT:-5001}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
