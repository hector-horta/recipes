name: Weekly AI Code Audit
on:
  schedule:
    - cron: '0 9 * * 1' # Todos los lunes a las 09:00 UTC
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para comparar historial semanal

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Review Script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/ai_review.py