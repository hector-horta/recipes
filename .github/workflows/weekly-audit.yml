name: Weekly AI Code Audit
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    # Esta variable es la clave para silenciar el aviso de Node 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # No te preocupes por la v4, el env de arriba la fuerza a Node 24
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5 # v5 es la versión más estable y compatible
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Review Script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/ai_review.py