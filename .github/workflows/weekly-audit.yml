name: Weekly AI Code Audit
on:
  schedule:
    - cron: '0 9 * * 1' # Todos los lunes a las 09:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      # Forzamos el uso de Node 24 para evitar el warning de deprecación
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # Actualizado a v5
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v6 # Actualizado a v6
        with:
          python-version: '3.11' # Versión estable actual

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Review Script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/ai_review.py